node_id: "edge-pose-001"

ingest:
  sources:
    - "webcam:0"
  max_fps: 15
  loop_files: true
  idle_sleep_ms: 10
  sync: false
  sync_timeout_ms: 200

inference:
  backend: "ultralytics"
  model: "C:/Users/Admin/Desktop/model/yolo11n-pose.pt"
  device: "cpu"
  conf: 0.4
  classes: [0]
  preview: true
  preview_window: "HeliosNet-Pose"
  batch_size: 1
  batch_timeout_ms: 20
  phone_id_enabled: false
  phone_catalog_dir: "./data/phone_catalog"
  phone_min_score: 0.45
  phone_top_k: 3
  phone_embed_backend: "resnet18"
  phone_embed_device: "cpu"
  phone_cache_path: "./data/phone_catalog_index.npz"

tracker:
  backend: "bytetrack"
  iou_thr: 0.3
  max_age: 15
  track_activation_threshold: 0.25
  minimum_matching_threshold: 0.8
  lost_track_buffer: 30
  frame_rate: 30
  minimum_consecutive_frames: 1
  preview: false
  preview_window: "HeliosNet-Track"

events:
  rules:
    - type: "count_threshold"
      name: "crowd"
      threshold: 3
      prefer_tracks: true
    - type: "pose_state"
      name: "pose_monitor"
      classes: [0]
      min_score: 0.55
    - type: "gesture_state"
      name: "gesture_monitor"
      classes: [0]
      min_score: 0.6
  store_path: "./data/events.jsonl"
  per_source_files: true
  csv_path: "./data/events.csv"

sync:
  mode: "local"
  interval_sec: 60
  batch_size: 100
  queue_path: "./data/sync_queue.jsonl"
  sent_path: "./data/sent_events.jsonl"
  acked_path: "./data/sync_acked.txt"

distributed:
  enabled: false
  bind_host: "0.0.0.0"
  bind_port: 7946
  shared_secret: ""
  require_signed_control: false
  require_signed_commands: false
  gossip_interval_sec: 2
  peer_timeout_sec: 10
  bootstrap_peers: []
  cluster_state_path: "./data/cluster_state.json"
  raft_state_path: "./data/raft_state.json"
  raft_log_path: "./data/raft_log.jsonl"
  raft_heartbeat_sec: 1.0
  raft_min_cluster_size: 1
  model_registry_path: "./data/model_registry.json"
  model_commands_path: "./data/model_commands.jsonl"
  operator_commands_path: "./data/operator_commands.jsonl"
  canary_duration_sec: 120
  rollback_flag_path: "./data/model_rollback.flag"
  audit_log_path: "./data/audit_log.jsonl"

observability:
  metrics: true
  metrics_port: 9090
  web_ui: true
  web_ui_host: "0.0.0.0"
  web_ui_port: 8080
  telegram_enabled: false
  telegram_bot_token: ""
  telegram_chat_id: ""
  telegram_min_interval_sec: 5

energy:
  simulated_percent: 55
  profiles:
    - level: "FULL"
      threshold: 80
      resolution: "1280x720"
      fps: 30
      batch: 8
      sync_interval_sec: 30
    - level: "NORMAL"
      threshold: 40
      resolution: "640x480"
      fps: 20
      batch: 4
      sync_interval_sec: 60
    - level: "LOW"
      threshold: 15
      resolution: "416x416"
      fps: 10
      batch: 2
      sync_interval_sec: 300
    - level: "CRITICAL"
      threshold: 0
      resolution: "320x240"
      fps: 3
      batch: 1
      sync_interval_sec: 900

runtime:
  tick_ms: 10

mission:
  enabled: true
  retask_every_sec: 5
  top_k_sources: 1
  alert_weight: 1.0
  slo_weight: 2.0
  fall_weight: 2.5
  drift_weight: 1.5

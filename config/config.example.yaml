node_id: "edge-001"

ingest:
  sources:
    - "webcam:0"
  max_fps: 15
  loop_files: true
  idle_sleep_ms: 10
  sync: true
  sync_timeout_ms: 200

fusion:
  enabled: false
  strategy: "late"   # late | early_rgb_thermal
  sync_window_ms: 120
  sources:
    src-00:
      sensor: "rgb"
    src-01:
      sensor: "thermal"

inference:
  backend: "ultralytics"
  model: "C:/Users/Admin/Desktop/model/yolo11n.pt"
  device: "cpu"
  conf: 0.5
  classes: []
  preview: false
  preview_window: "HeliosNet"
  batch_size: 2
  batch_timeout_ms: 20
  shadow_enabled: true
  shadow_sample_rate: 10
  phone_id_enabled: false
  phone_catalog_dir: "./data/phone_catalog"
  phone_min_score: 0.45
  phone_top_k: 3
  phone_embed_backend: "resnet18"
  phone_embed_device: "cpu"
  phone_cache_path: "./data/phone_catalog_index.npz"

tracker:
  backend: "bytetrack"
  iou_thr: 0.3
  max_age: 15
  track_activation_threshold: 0.25
  minimum_matching_threshold: 0.8
  lost_track_buffer: 30
  frame_rate: 30
  minimum_consecutive_frames: 1
  preview: true
  preview_window: "HeliosNet"

events:
  rules:
    - type: "count_threshold"
      name: "crowd"
      threshold: 3
      prefer_tracks: true
    - type: "pose_state"
      name: "pose_monitor"
      classes: [0]
      min_score: 0.55
    - type: "gesture_state"
      name: "gesture_monitor"
      classes: [0]
      min_score: 0.6
  store_path: "./data/events.jsonl"
  per_source_files: true
  csv_path: "./data/events.csv"

sync:
  mode: "local"
  interval_sec: 60
  batch_size: 100
  queue_path: "./data/sync_queue.jsonl"
  sent_path: "./data/sent_events.jsonl"
  acked_path: "./data/sync_acked.txt"

distributed:
  enabled: true
  bind_host: "0.0.0.0"
  bind_port: 7946
  shared_secret: ""
  require_signed_control: false
  require_signed_commands: false
  gossip_interval_sec: 2
  peer_timeout_sec: 10
  bootstrap_peers: []
  cluster_state_path: "./data/cluster_state.json"
  raft_state_path: "./data/raft_state.json"
  raft_log_path: "./data/raft_log.jsonl"
  raft_heartbeat_sec: 1.0
  raft_min_cluster_size: 1
  model_registry_path: "./data/model_registry.json"
  model_commands_path: "./data/model_commands.jsonl"
  operator_commands_path: "./data/operator_commands.jsonl"
  canary_duration_sec: 120
  rollback_flag_path: "./data/model_rollback.flag"
  audit_log_path: "./data/audit_log.jsonl"

control_plane:
  policy_enabled: true
  policy_path: "./data/policy.json"
  config_state_path: "./data/config_state.json"
  config_commands_path: "./data/config_commands.jsonl"
  mtls_enabled: false
  tls_cert_path: "./secrets/node.crt"
  tls_key_path: "./secrets/node.key"
  tls_ca_path: "./secrets/ca.crt"
  artifact_manifest_path: "./data/artifacts.json"
  rotation_state_path: "./data/key_rotation.json"
  key_rotation_interval_sec: 86400
  mtls_host: "0.0.0.0"
  mtls_port: 9443
  attestation_enabled: true
  attestation_nonce_path: "./data/attestation_nonce.txt"
  attestation_report_path: "./data/attestation_report.json"
  attestation_interval_sec: 60
  boot_chain_path: "./data/boot_chain.json"
  provenance_enabled: true
  bundle_manifest_path: "./data/bundles.json"
  provenance_interval_sec: 60

observability:
  metrics: true
  metrics_port: 9090
  web_ui: true
  web_ui_host: "0.0.0.0"
  web_ui_port: 8080
  telegram_enabled: false
  telegram_bot_token: ""
  telegram_chat_id: ""
  telegram_min_interval_sec: 5

safety:
  slo:
    max_e2e_latency_ms_p95: 400
    min_uptime_percent: 99.0
    max_miss_rate: 0.25
    window_size: 200
    breach_cooldown_sec: 15
  watchdog:
    enabled: true
    stale_heartbeat_sec: 5
    action_cooldown_sec: 5
    degraded_fps_cap: 8
    safe_fps_cap: 4
    degraded_resolution: "640x480"
    safe_resolution: "416x416"
  replay:
    enabled: true
    incidents_path: "./data/incidents"
    image_quality: 85

mlops:
  drift:
    enabled: true
    ema_alpha: 0.03
    data_threshold: 0.18
    concept_threshold: 0.15
    event_cooldown_sec: 30
    state_path: "./data/drift_state.json"
  evaluation:
    enabled: false
    benchmark_path: "./data/edge_benchmark.jsonl"
    interval_sec: 600
    max_cases: 20

mission:
  enabled: true
  retask_every_sec: 5
  top_k_sources: 1
  alert_weight: 1.0
  slo_weight: 2.0
  fall_weight: 2.5
  drift_weight: 1.5

simulation:
  enabled: false
  fps: 5
  frame_size: [640, 480]
  weather: "clear"       # clear | rain | fog
  noise: 0.02
  interference: 0.0
  sources:
    - "sim-cam-00"
  incidents:
    enabled: false
    scenario_path: "./data/sim_incidents.jsonl"
    interval_sec: 10

energy:
  simulated_percent: 55
  profiles:
    - level: "FULL"
      threshold: 80
      resolution: "1280x720"
      fps: 30
      batch: 8
      sync_interval_sec: 30
    - level: "NORMAL"
      threshold: 40
      resolution: "640x480"
      fps: 20
      batch: 4
      sync_interval_sec: 60
    - level: "LOW"
      threshold: 15
      resolution: "416x416"
      fps: 10
      batch: 2
      sync_interval_sec: 300
    - level: "CRITICAL"
      threshold: 0
      resolution: "320x240"
      fps: 3
      batch: 1
      sync_interval_sec: 900

runtime:
  tick_ms: 10

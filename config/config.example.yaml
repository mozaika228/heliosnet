node_id: "edge-001"

ingest:
  sources:
    - "webcam:0"
  max_fps: 15
  loop_files: true
  idle_sleep_ms: 10
  sync: true
  sync_timeout_ms: 200

inference:
  backend: "ultralytics"
  model: "C:/Users/Admin/Desktop/model/yolo11n.pt"
  device: "cpu"
  conf: 0.5
  classes: []
  preview: false
  preview_window: "HeliosNet"
  batch_size: 2
  batch_timeout_ms: 20

tracker:
  backend: "bytetrack"
  iou_thr: 0.3
  max_age: 15
  track_activation_threshold: 0.25
  minimum_matching_threshold: 0.8
  lost_track_buffer: 30
  frame_rate: 30
  minimum_consecutive_frames: 1
  preview: true
  preview_window: "HeliosNet"

events:
  rules:
    - type: "count_threshold"
      name: "crowd"
      threshold: 3
      prefer_tracks: true
  store_path: "./data/events.jsonl"
  per_source_files: true
  csv_path: "./data/events.csv"

sync:
  mode: "offline"
  interval_sec: 60

observability:
  metrics: true
  metrics_port: 9090

energy:
  simulated_percent: 55
  profiles:
    - level: "FULL"
      threshold: 80
      resolution: "1280x720"
      fps: 30
      batch: 8
      sync_interval_sec: 30
    - level: "NORMAL"
      threshold: 40
      resolution: "640x480"
      fps: 20
      batch: 4
      sync_interval_sec: 60
    - level: "LOW"
      threshold: 15
      resolution: "416x416"
      fps: 10
      batch: 2
      sync_interval_sec: 300
    - level: "CRITICAL"
      threshold: 0
      resolution: "320x240"
      fps: 3
      batch: 1
      sync_interval_sec: 900

runtime:
  tick_ms: 10

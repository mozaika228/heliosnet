node_id: "edge-dev"

ingest:
  sources:
    - "file:./data/sample.mp4"
  max_fps: 15
  sync: false
  loop_files: true
  idle_sleep_ms: 10

detect:
  backend: "stub"
  model: "yolov8n.onnx"
  device: "cpu"
  batch_size: 1
  adaptive_res: false
  conf_threshold: 0.25
  max_det: 100

track:
  method: "bytetrack"
  reid: false

events:
  rules:
    - type: "count_threshold"
      name: "crowd"
      threshold: 5
      prefer_tracks: false
    - type: "zone_entry"
      name: "zone_a_entry"
      rect: [100, 100, 400, 400]
      prefer_tracks: false

edge_bus:
  local_store: "./data/edge_bus"
  sync_interval_sec: 300
  store_all: true

runtime:
  tick_ms: 50

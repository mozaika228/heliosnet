node_id: "edge-001"

ingest:
  sources: []
  max_fps: 30
  sync: true
  loop_files: true
  idle_sleep_ms: 5

detect:
  backend: "stub"
  model: "yolov8n.onnx"
  device: "cuda"
  batch_size: 4
  adaptive_res: true
  conf_threshold: 0.25
  max_det: 300

track:
  method: "bytetrack"
  reid: false

events:
  rules: []

edge_bus:
  local_store: "./data/edge_bus"
  sync_interval_sec: 60
  store_all: false

runtime:
  tick_ms: 10
